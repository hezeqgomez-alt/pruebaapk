name: Build Windows EXE

on:
  push:
    branches: [claude/charming-rubin-d3P33, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (Vite)
        run: npx vite build

      - name: Build Electron installer (Windows)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find generated files
        if: always()
        run: |
          echo "=== Contents of release/ ==="
          dir release /s /b 2>nul || echo "release/ not found"
        shell: cmd

      - name: Upload all EXE files
        uses: actions/upload-artifact@v4
        with:
          name: GastoTracker-Windows-EXE
          path: |
            release/**/*.exe
            release/*.exe
          if-no-files-found: warn
          retention-days: 30
